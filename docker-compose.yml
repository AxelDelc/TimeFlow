services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persiste la base de données SQLite entre les redémarrages du conteneur
      - ./dev.db:/app/dev.db
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app
          ignore:
            - node_modules/
